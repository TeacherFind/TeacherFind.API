name: Deploy .NET API to Plesk via FTP

on:
  push:
    branches:
      - Develop
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./TeacherFind.API/TeacherFind.API.csproj

      - name: Create Production appsettings
        run: |
          cat > ./TeacherFind.API/appsettings.Production.json << 'EOF'
          {
            "ConnectionStrings": {
              "DefaultConnection": "${{ secrets.DB_CONNECTION_STRING }}"
            },
            "Jwt": {
              "Key": "${{ secrets.JWT_KEY }}",
              "Issuer": "TeacherFind",
              "Audience": "TeacherFind",
              "ExpiryMinutes": "120"
            },
            "Email": {
              "Provider": "Brevo",
              "ApiKey": "${{ secrets.BREVO_API_KEY }}",
              "FromEmail": "destek@ozeldersvip.com",
              "FromName": "Özel Ders VIP"
            },
            "Cors": {
              "AllowedOrigins": [
                 "http://ozeldersvip.com",
                 "https://ozeldersvip.com",
                 "http://www.ozeldersvip.com",
                 "https://www.ozeldersvip.com",
                 "http://45.195.231.69"
              ]
            }
          }
          EOF

      - name: Publish
        run: dotnet publish ./TeacherFind.API/TeacherFind.API.csproj -c Release -o ./publish

      - name: Put App Offline
        run: |
          echo "<html><body>Site is updating. Please wait...</body></html>" > ./publish/app_offline.htm
          curl -T ./publish/app_offline.htm ftp://${{ secrets.FTP_SERVER }}/api.ozeldersvip.com/app_offline.htm --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
          sleep 5

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /api.ozeldersvip.com/
          dangerous-clean-slate: true
          state-name: .ftp-deploy-sync-state-v2.json

      - name: Bring App Online
        if: always()
        run: |
          curl -Q "-DELE /api.ozeldersvip.com/app_offline.htm" ftp://${{ secrets.FTP_SERVER }}/ --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"