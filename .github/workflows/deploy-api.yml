name: Deploy .NET API to Plesk via FTP

on:
  push:
    branches:
      - Develop
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ./TeacherFind.API/TeacherFind.API.csproj

      - name: Create Production appsettings
        run: |
          cat > ./TeacherFind.API/appsettings.Production.json << 'EOF'
          {
            "ConnectionStrings": {
              "DefaultConnection": "${{ secrets.DB_CONNECTION_STRING }}"
            },
            "Jwt": {
              "Key": "${{ secrets.JWT_KEY }}"
            },
            "Email": {
              "ApiKey": "${{ secrets.BREVO_API_KEY }}",
              "FromEmail": "noreply@ozeldersburada.com",
              "FromName": "Özel Ders Burada"
            }
          }
          EOF

      - name: Publish
        run: dotnet publish ./TeacherFind.API/TeacherFind.API.csproj -c Release -o ./publish

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /api.ozeldersvip.com/
